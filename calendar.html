<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reservar Turno</title>

<style>

body {
    font-family: Arial, sans-serif;
    background: #f3f4f6;
    text-align: center;
}

h1 {
    margin-top: 20px;
}

.controls {
    margin: 20px;
}

button {
    padding: 10px 15px;
    margin: 5px;
    cursor: pointer;
    border-radius: 6px;
    border: 1px solid #ccc;
    background: white;
}

.calendar {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 15px;
    padding: 20px;
}

.day {
    background: #e5e7eb;
    border-radius: 10px;
    padding: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.day h3 {
    margin: 5px 0 0 0;
}

.date {
    font-size: 13px;
    color: #555;
    margin-bottom: 10px;
}

.slot {
    padding: 8px;
    margin: 6px 0;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.2s;
}

.available {
    background: #b7ddb7;
}

.available:hover {
    background: #9fd39f;
}

.busy {
    background: #e2bcbc;
    cursor: not-allowed;
}

</style>
</head>

<body>

<h1>Reservar Turno</h1>

<div class="controls">
    <button onclick="changeWeek(-1)">⬅ Semana anterior</button>
    <button onclick="changeWeek(1)">Semana siguiente ➡</button>
</div>

<div id="calendar" class="calendar"></div>

<script>

let weekOffset = 0;

const weekdayNames = [
    "Domingo",
    "Lunes",
    "Martes",
    "Miércoles",
    "Jueves",
    "Viernes",
    "Sábado"
];

async function loadCalendar() {

    const res = await fetch(`/week-availability?week_offset=${weekOffset}&t=${Date.now()}`);

    const data = await res.json();

    const container = document.getElementById("calendar");
    container.innerHTML = "";

    data.days.forEach(day => {

        const jsDate = new Date(day.date + "T00:00:00");
        if (jsDate.getDay() === 0) return;

        const dayDiv = document.createElement("div");
        dayDiv.className = "day";

        const title = document.createElement("h3");
        title.innerText = jsDate.toLocaleDateString("es-ES", { weekday: "long" });
        dayDiv.appendChild(title);

        const dateText = document.createElement("div");
        dateText.className = "date";
        dateText.innerText = day.date;
        dayDiv.appendChild(dateText);

        day.slots.forEach(slot => {
            const slotDiv = document.createElement("div");
            slotDiv.className = "slot " + (slot.available ? "available" : "busy");
            slotDiv.innerText = slot.time;

            if (slot.available) {
                slotDiv.onclick = () => 
                reserve(day.date, slot.time);
            }

            dayDiv.appendChild(slotDiv);
        });

        container.appendChild(dayDiv);
    });
}

function changeWeek(offset) {
    weekOffset += offset;
    loadCalendar();
}


async function reserve(date, time) {

    const name = prompt("Tu nombre:");
    if (!name) return;

    const phone = prompt("Teléfono:");
    if (!phone) return;

    // ✅ crear datetime ISO correcto
    const startTime = `${date}T${time}:00Z`;

    console.log("BOOKING:", startTime);

    const res = await fetch("/book", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name: name,
            phone: phone,
            start_time: startTime
        })
    });

    const result = await res.json();

    if (res.ok) {
        alert("✅ Turno confirmado");
        loadCalendar();
        return;
    }

    let message = "Error";

    if (typeof result.detail === "string")
        message = result.detail;
    else if (Array.isArray(result.detail))
        message = result.detail[0].msg;

    alert(message);
}
loadCalendar();
setInterval(() => {
    loadCalendar();
}, 10000);
</script>

</body>
</html>
