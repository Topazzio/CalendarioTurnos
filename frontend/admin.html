<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doble AA — Admin</title>
  <link rel="icon" type="image/x-icon" href="/assets/ico.jpg" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* ══════════════════════════════════════════
       TOKENS & RESET
    ══════════════════════════════════════════ */
    :root {
      --bg:        #0d0f14;
      --surface:   #151820;
      --card:      #1c2030;
      --border:    #252a3a;
      --accent:    #8fc9b0;
      --accent2:   #5bb894;
      --danger:    #e05c5c;
      --warn:      #f0a04b;
      --text:      #e8eaf2;
      --muted:     #6b7280;
      --radius:    14px;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ══════════════════════════════════════════
       LOGIN SCREEN
    ══════════════════════════════════════════ */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: radial-gradient(ellipse at 50% 0%, rgba(143,201,176,.18) 0%, transparent 65%),
                  var(--bg);
    }

    .login-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 56px 48px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 40px 80px rgba(0,0,0,.5);
      animation: fadeUp .5s ease;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 40px;
    }
    .login-logo h1 {
      font-family: var(--font-head);
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -1px;
    }
    .login-logo p {
      color: var(--muted);
      font-size: .88rem;
      margin-top: 4px;
    }

    .field {
      margin-bottom: 18px;
    }
    .field label {
      display: block;
      font-size: .8rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 8px;
    }
    .field input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 1rem;
      color: var(--text);
      font-family: var(--font-body);
      transition: border-color .2s;
      outline: none;
    }
    .field input:focus { border-color: var(--accent); }

    .btn-primary {
      width: 100%;
      padding: 15px;
      background: var(--accent);
      color: #0d0f14;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      font-family: var(--font-head);
      cursor: pointer;
      transition: background .2s, transform .15s;
      margin-top: 8px;
    }
    .btn-primary:hover  { background: var(--accent2); transform: translateY(-2px); }
    .btn-primary:active { transform: translateY(0); }

    #login-error {
      color: var(--danger);
      font-size: .88rem;
      text-align: center;
      margin-top: 14px;
      min-height: 20px;
    }

    /* ══════════════════════════════════════════
       SHELL
    ══════════════════════════════════════════ */
    #app { display: none; min-height: 100vh; }

    /* ── Sidebar ── */
    .sidebar {
      position: fixed;
      top: 0; left: 0;
      width: 240px;
      height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 28px 0;
      z-index: 100;
    }

    .sidebar-brand {
      padding: 0 24px 32px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-brand h2 {
      font-family: var(--font-head);
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--accent);
    }
    .sidebar-brand span {
      font-size: .76rem;
      color: var(--muted);
    }

    .nav-items { padding: 20px 12px; flex: 1; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: .9rem;
      color: var(--muted);
      transition: all .2s;
      margin-bottom: 4px;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: var(--font-body);
    }
    .nav-item i { width: 18px; text-align: center; }
    .nav-item:hover   { background: var(--card); color: var(--text); }
    .nav-item.active  { background: rgba(143,201,176,.12); color: var(--accent); font-weight: 500; }

    .sidebar-logout {
      padding: 12px;
      border-top: 1px solid var(--border);
    }
    .btn-logout {
      width: 100%;
      padding: 11px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      cursor: pointer;
      font-size: .85rem;
      font-family: var(--font-body);
      transition: all .2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

    /* ── Main ── */
    .main {
      margin-left: 240px;
      padding: 36px 40px;
      min-height: 100vh;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 36px;
    }
    .page-header h2 {
      font-family: var(--font-head);
      font-size: 1.8rem;
      font-weight: 700;
    }

    /* ── Tabs ── */
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeUp .3s ease; }

    /* ══════════════════════════════════════════
       DASHBOARD
    ══════════════════════════════════════════ */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 36px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px;
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 100%;
      background: var(--accent);
      border-radius: 3px 0 0 3px;
    }
    .stat-card.warn::before  { background: var(--warn); }
    .stat-card.danger::before{ background: var(--danger); }

    .stat-label { font-size: .8rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
    .stat-value { font-family: var(--font-head); font-size: 2.4rem; font-weight: 700; line-height: 1; }

    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    .chart-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
    }
    .chart-card h3 {
      font-family: var(--font-head);
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--text);
    }

    /* Bar chart manual */
    .bar-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .bar-label { font-size: .82rem; width: 160px; flex-shrink: 0; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track { flex: 1; background: var(--border); border-radius: 6px; height: 10px; overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 6px; background: var(--accent); transition: width .6s ease; }
    .bar-count { font-size: .82rem; color: var(--text); font-weight: 600; width: 28px; text-align: right; }

    /* Bajo stock lista */
    .alert-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .alert-item:last-child { border-bottom: none; }
    .alert-nombre { font-size: .9rem; }
    .alert-stock  { font-size: .82rem; font-weight: 700; }
    .alert-stock.zero { color: var(--danger); }
    .alert-stock.low  { color: var(--warn); }

    /* ══════════════════════════════════════════
       ACCESORIOS
    ══════════════════════════════════════════ */
    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .btn-add {
      padding: 11px 22px;
      background: var(--accent);
      color: #0d0f14;
      border: none;
      border-radius: 10px;
      font-size: .9rem;
      font-weight: 600;
      font-family: var(--font-head);
      cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      transition: .2s;
    }
    .btn-add:hover { background: var(--accent2); }

    .search-input {
      padding: 11px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: .9rem;
      flex: 1;
      min-width: 180px;
      outline: none;
    }
    .search-input:focus { border-color: var(--accent); }

    /* Tabla */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .88rem;
    }
    thead th {
      padding: 12px 14px;
      background: var(--surface);
      text-align: left;
      font-size: .76rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      border-bottom: 1px solid var(--border);
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }
    tbody tr:hover { background: rgba(255,255,255,.025); }
    tbody td { padding: 14px; vertical-align: middle; }

    .badge-cat {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: .76rem;
      font-weight: 600;
      background: rgba(143,201,176,.15);
      color: var(--accent);
      border: 1px solid rgba(143,201,176,.25);
    }

    .stock-chip {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: .8rem;
      font-weight: 600;
    }
    .stock-chip.ok     { background: rgba(143,201,176,.15); color: var(--accent2); }
    .stock-chip.low    { background: rgba(240,160,75,.15);  color: var(--warn); }
    .stock-chip.zero   { background: rgba(224,92,92,.15);   color: var(--danger); }

    .row-actions { display: flex; gap: 8px; }
    .btn-icon {
      width: 32px; height: 32px;
      border: 1px solid var(--border);
      background: transparent;
      border-radius: 8px;
      color: var(--muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: .2s;
      font-size: .85rem;
    }
    .btn-icon:hover         { border-color: var(--accent); color: var(--accent); }
    .btn-icon.del:hover     { border-color: var(--danger); color: var(--danger); }
    .btn-icon.stock-btn:hover{ border-color: var(--warn);  color: var(--warn); }

    /* ══════════════════════════════════════════
       TURNOS
    ══════════════════════════════════════════ */
    .filters {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .filter-select {
      padding: 10px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: .88rem;
      outline: none;
      cursor: pointer;
    }
    .filter-select:focus { border-color: var(--accent); }

    /* ══════════════════════════════════════════
       MODAL
    ══════════════════════════════════════════ */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
      opacity: 0; pointer-events: none;
      transition: opacity .25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      width: 100%;
      max-width: 520px;
      transform: translateY(16px);
      transition: transform .25s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal h3 {
      font-family: var(--font-head);
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 28px;
    }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .modal-grid .full { grid-column: 1 / -1; }

    .form-field { display: flex; flex-direction: column; gap: 6px; }
    .form-field label { font-size: .78rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    .form-field input,
    .form-field select {
      padding: 11px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: .9rem;
      outline: none;
      transition: border-color .2s;
    }
    .form-field input:focus,
    .form-field select:focus { border-color: var(--accent); }

    .modal-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 28px; }
    .btn-cancel {
      padding: 11px 22px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      cursor: pointer;
      font-family: var(--font-body);
      transition: .2s;
    }
    .btn-cancel:hover { border-color: var(--text); color: var(--text); }

    .btn-save {
      padding: 11px 22px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #0d0f14;
      font-weight: 700;
      font-family: var(--font-head);
      cursor: pointer;
      transition: .2s;
    }
    .btn-save:hover { background: var(--accent2); }

    /* Modal stock rápido */
    .stock-modal-body {
      display: flex; gap: 14px; align-items: center; margin-bottom: 20px;
    }
    .stock-input {
      width: 90px;
      padding: 12px;
      text-align: center;
      font-size: 1.4rem;
      font-weight: 700;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font-head);
      outline: none;
    }
    .stock-input:focus { border-color: var(--accent); }
    .btn-step {
      width: 40px; height: 40px;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 8px;
      color: var(--text);
      font-size: 1.3rem;
      cursor: pointer;
      transition: .2s;
    }
    .btn-step:hover { border-color: var(--accent); color: var(--accent); }

    /* ══════════════════════════════════════════
       EMPTY & LOADING STATES
    ══════════════════════════════════════════ */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty i { font-size: 2.5rem; margin-bottom: 14px; display: block; }

    .spinner {
      display: inline-block;
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    .loading-wrap {
      display: flex; justify-content: center; padding: 60px;
    }

    /* ══════════════════════════════════════════
       TOAST
    ══════════════════════════════════════════ */
    .toast-container {
      position: fixed;
      bottom: 28px; right: 28px;
      display: flex; flex-direction: column; gap: 10px;
      z-index: 9999;
    }
    .toast {
      padding: 14px 20px;
      border-radius: 12px;
      font-size: .9rem;
      font-weight: 500;
      border-left: 4px solid var(--accent);
      background: var(--card);
      color: var(--text);
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
      animation: slideIn .3s ease;
      max-width: 320px;
    }
    .toast.error  { border-color: var(--danger); }
    .toast.warn   { border-color: var(--warn); }
    .toast.hide   { animation: slideOut .3s ease forwards; }

    /* ══════════════════════════════════════════
       ANIMATIONS
    ══════════════════════════════════════════ */
    @keyframes fadeUp   { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin     { to { transform: rotate(360deg); } }
    @keyframes slideIn  { from { opacity:0; transform:translateX(30px); } to { opacity:1; transform:translateX(0); } }
    @keyframes slideOut { from { opacity:1; transform:translateX(0); }  to { opacity:0; transform:translateX(30px); } }

    /* ══════════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════════ */
    @media (max-width: 900px) {
      .sidebar { width: 64px; }
      .sidebar-brand, .nav-item span, .sidebar-brand span { display: none; }
      .main { margin-left: 64px; padding: 24px 20px; }
      .charts-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      .modal-grid { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════
     LOGIN
════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <h1>Doble AA</h1>
      <p>Panel de Administración</p>
    </div>
    <div class="field">
      <label>Usuario</label>
      <input type="text" id="login-user" placeholder="admin" autocomplete="username" />
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn-primary" id="login-btn">Ingresar</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- ═══════════════════════════════════
     APP SHELL
════════════════════════════════════ -->
<div id="app">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h2>Doble AA</h2>
      <span>Admin Panel</span>
    </div>
    <nav class="nav-items">
      <button class="nav-item active" data-tab="dashboard">
        <i class="fas fa-chart-line"></i><span>Dashboard</span>
      </button>
      <button class="nav-item" data-tab="accesorios">
        <i class="fas fa-tags"></i><span>Accesorios</span>
      </button>
      <button class="nav-item" data-tab="turnos">
        <i class="fas fa-calendar-check"></i><span>Turnos</span>
      </button>
    </nav>
    <div class="sidebar-logout">
      <button class="btn-logout" id="logout-btn">
        <i class="fas fa-sign-out-alt"></i><span>Cerrar sesión</span>
      </button>
    </div>
  </aside>

  <main class="main">

    <!-- ── DASHBOARD ── -->
    <div class="tab-content active" id="tab-dashboard">
      <div class="page-header">
        <h2>Dashboard</h2>
        <button class="btn-add" id="refresh-stats" style="background:var(--surface);border:1px solid var(--border);color:var(--muted);">
          <i class="fas fa-sync-alt"></i><span>Actualizar</span>
        </button>
      </div>

      <div class="stats-grid" id="stats-grid">
        <div class="loading-wrap" style="grid-column:1/-1"><div class="spinner"></div></div>
      </div>

      <div class="charts-grid">
        <div class="chart-card">
          <h3><i class="fas fa-tshirt" style="color:var(--accent);margin-right:8px"></i> Materiales más pedidos</h3>
          <div id="chart-materiales"></div>
        </div>
        <div class="chart-card">
          <h3><i class="fas fa-exclamation-triangle" style="color:var(--warn);margin-right:8px"></i> Bajo stock</h3>
          <div id="chart-stock"></div>
        </div>
      </div>
    </div>

    <!-- ── ACCESORIOS ── -->
    <div class="tab-content" id="tab-accesorios">
      <div class="page-header">
        <h2>Accesorios</h2>
        <button class="btn-add" id="btn-nuevo-acc">
          <i class="fas fa-plus"></i> Nuevo accesorio
        </button>
      </div>

      <div class="toolbar">
        <input class="search-input" id="search-acc" placeholder="🔍  Buscar accesorio…" />
        <select class="filter-select" id="filter-cat">
          <option value="">Todas las categorías</option>
          <option>tow-strap</option>
          <option>almohadon</option>
          <option>volante</option>
          <option>general</option>
        </select>
      </div>

      <div class="table-wrap">
        <table id="acc-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Nombre</th>
              <th>Categoría</th>
              <th>Precio</th>
              <th>Stock</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="acc-tbody">
            <tr><td colspan="7"><div class="loading-wrap"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- ── TURNOS ── -->
    <div class="tab-content" id="tab-turnos">
      <div class="page-header">
        <h2>Turnos agendados</h2>
      </div>

      <div class="filters">
        <input class="search-input" id="search-turno" placeholder="🔍  Buscar por nombre, auto…" style="max-width:280px;" />
        <select class="filter-select" id="filter-material">
          <option value="">Todos los materiales</option>
          <option>Cuerina Premium</option>
          <option>Cuero Sintético</option>
          <option>Cuero Natural</option>
          <option>Lo decido en el momento</option>
        </select>
        <select class="filter-select" id="filter-pago">
          <option value="">Todos los pagos</option>
          <option>Transferencia</option>
          <option>Efectivo</option>
        </select>
      </div>

      <div class="table-wrap">
        <table id="turnos-table">
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Hora</th>
              <th>Cliente</th>
              <th>Teléfono</th>
              <th>Auto</th>
              <th>Año</th>
              <th>Material</th>
              <th>Pago</th>
            </tr>
          </thead>
          <tbody id="turnos-tbody">
            <tr><td colspan="8"><div class="loading-wrap"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<!-- ═══════════════════════════════════
     MODAL ACCESORIO
════════════════════════════════════ -->
<div class="modal-overlay" id="modal-acc">
  <div class="modal">
    <h3 id="modal-acc-title">Nuevo accesorio</h3>
    <input type="hidden" id="acc-id" />
    <div class="modal-grid">
      <div class="form-field full">
        <label>Nombre</label>
        <input type="text" id="acc-nombre" placeholder="Ej: Tow Strap Amarillo" />
      </div>
      <div class="form-field">
        <label>Precio ($)</label>
        <input type="number" id="acc-precio" placeholder="14000" min="0" />
      </div>
      <div class="form-field">
        <label>Stock</label>
        <input type="number" id="acc-stock" placeholder="0" min="0" />
      </div>
      <div class="form-field">
        <label>Categoría</label>
        <select id="acc-cat">
          <option value="general">general</option>
          <option value="tow-strap">tow-strap</option>
          <option value="almohadon">almohadon</option>
          <option value="volante">volante</option>
        </select>
      </div>
      <div class="form-field">
        <label>Estado</label>
        <select id="acc-activo">
          <option value="1">Activo</option>
          <option value="0">Inactivo</option>
        </select>
      </div>
      <div class="form-field full">
        <label>URL imagen</label>
        <input type="text" id="acc-imagen" placeholder="/img/producto.jpg" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="modal-acc-cancel">Cancelar</button>
      <button class="btn-save"   id="modal-acc-save">Guardar</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════
     MODAL STOCK RÁPIDO
════════════════════════════════════ -->
<div class="modal-overlay" id="modal-stock">
  <div class="modal" style="max-width:340px;text-align:center;">
    <h3 id="modal-stock-title">Actualizar stock</h3>
    <div class="stock-modal-body" style="justify-content:center;">
      <button class="btn-step" id="stock-dec">−</button>
      <input class="stock-input" type="number" id="stock-val" min="0" />
      <button class="btn-step" id="stock-inc">+</button>
    </div>
    <div class="modal-actions" style="justify-content:center;">
      <button class="btn-cancel" id="modal-stock-cancel">Cancelar</button>
      <button class="btn-save"   id="modal-stock-save">Guardar</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toasts"></div>

<!-- ═══════════════════════════════════
     JAVASCRIPT
════════════════════════════════════ -->
<script>
/* ── helpers ── */
const $ = id => document.getElementById(id);
const API = '';   // mismo origen

let TOKEN = localStorage.getItem('aa_token') || '';
let allAccesorios = [];
let allTurnos     = [];
let editStockId   = null;

/* ── toast ── */
function toast(msg, type = 'ok', dur = 3500) {
  const el = document.createElement('div');
  el.className = `toast ${type === 'error' ? 'error' : type === 'warn' ? 'warn' : ''}`;
  el.textContent = msg;
  $('toasts').appendChild(el);
  setTimeout(() => {
    el.classList.add('hide');
    setTimeout(() => el.remove(), 350);
  }, dur);
}

/* ── fetch con auth ── */
async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + TOKEN,
      ...opts.headers
    },
    ...opts
  });
  if (res.status === 401) { logout(); return null; }
  return res;
}

/* ══════════════════════════════════════════
   LOGIN
══════════════════════════════════════════ */
async function doLogin() {
  const user = $('login-user').value.trim();
  const pass = $('login-pass').value;
  $('login-error').textContent = '';
  $('login-btn').textContent = 'Ingresando…';

  const fd = new FormData();
  fd.append('username', user);
  fd.append('password', pass);

  try {
    const res = await fetch(API + '/admin/token', { method: 'POST', body: fd });
    if (!res.ok) throw new Error((await res.json()).detail || 'Error');
    const data = await res.json();
    TOKEN = data.access_token;
    localStorage.setItem('aa_token', TOKEN);
    enterApp();
  } catch (e) {
    $('login-error').textContent = '✗ ' + (e.message || 'Usuario o contraseña incorrectos');
  } finally {
    $('login-btn').textContent = 'Ingresar';
  }
}

$('login-btn').addEventListener('click', doLogin);
['login-user','login-pass'].forEach(id =>
  $(id).addEventListener('keydown', e => e.key === 'Enter' && doLogin())
);

function logout() {
  TOKEN = '';
  localStorage.removeItem('aa_token');
  $('app').style.display = 'none';
  $('login-screen').style.display = 'flex';
}

$('logout-btn').addEventListener('click', logout);

function enterApp() {
  $('login-screen').style.display = 'none';
  $('app').style.display = 'block';
  loadStats();
  loadAccesorios();
  loadTurnos();
}

// Auto-login si hay token guardado
if (TOKEN) enterApp();

/* ══════════════════════════════════════════
   TABS
══════════════════════════════════════════ */
document.querySelectorAll('.nav-item').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    $('tab-' + btn.dataset.tab).classList.add('active');
  });
});

/* ══════════════════════════════════════════
   DASHBOARD
══════════════════════════════════════════ */
async function loadStats() {
  $('stats-grid').innerHTML = '<div class="loading-wrap" style="grid-column:1/-1"><div class="spinner"></div></div>';
  const res = await api('/admin/stats');
  if (!res) return;
  const d = await res.json();

  $('stats-grid').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Total turnos</div>
      <div class="stat-value">${d.total_turnos}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Accesorios activos</div>
      <div class="stat-value">${d.total_accesorios}</div>
    </div>
    <div class="stat-card warn">
      <div class="stat-label">Bajo stock</div>
      <div class="stat-value" style="color:var(--warn)">${d.bajo_stock.length}</div>
    </div>
  `;

  /* bar chart materiales */
  const max = d.por_material[0]?.total || 1;
  $('chart-materiales').innerHTML = d.por_material.length
    ? d.por_material.map(r => `
        <div class="bar-row">
          <span class="bar-label" title="${r.material}">${r.material}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${(r.total/max*100).toFixed(1)}%"></div></div>
          <span class="bar-count">${r.total}</span>
        </div>`).join('')
    : '<p class="empty" style="padding:20px">Sin datos aún</p>';

  /* bajo stock */
  $('chart-stock').innerHTML = d.bajo_stock.length
    ? d.bajo_stock.map(r => `
        <div class="alert-item">
          <span class="alert-nombre">${r.nombre}</span>
          <span class="alert-stock ${r.stock === 0 ? 'zero' : 'low'}">${r.stock === 0 ? 'Sin stock' : r.stock + ' en stock'}</span>
        </div>`).join('')
    : '<div class="empty" style="padding:20px"><i class="fas fa-check-circle" style="color:var(--accent)"></i><p>Todo en orden 🎉</p></div>';
}

$('refresh-stats').addEventListener('click', loadStats);

/* ══════════════════════════════════════════
   ACCESORIOS
══════════════════════════════════════════ */
async function loadAccesorios() {
  const res = await api('/admin/accesorios');
  if (!res) return;
  allAccesorios = await res.json();
  renderAccesorios();
}

function renderAccesorios() {
  const q   = $('search-acc').value.toLowerCase();
  const cat = $('filter-cat').value;
  const filtered = allAccesorios.filter(a =>
    (!q   || a.nombre.toLowerCase().includes(q)) &&
    (!cat || a.categoria === cat)
  );

  if (!filtered.length) {
    $('acc-tbody').innerHTML = '<tr><td colspan="7"><div class="empty"><i class="fas fa-box-open"></i><p>Sin resultados</p></div></td></tr>';
    return;
  }

  $('acc-tbody').innerHTML = filtered.map(a => {
    const sc = a.stock === 0 ? 'zero' : a.stock <= 3 ? 'low' : 'ok';
    const sl = a.stock === 0 ? 'Sin stock' : a.stock;
    return `
      <tr>
        <td style="color:var(--muted);font-size:.8rem">#${a.id}</td>
        <td><strong>${a.nombre}</strong></td>
        <td><span class="badge-cat">${a.categoria}</span></td>
        <td>$${Number(a.precio).toLocaleString('es-AR')}</td>
        <td><span class="stock-chip ${sc}">${sl}</span></td>
        <td style="color:${a.activo ? 'var(--accent)' : 'var(--muted)'}; font-size:.82rem">${a.activo ? '● Activo' : '○ Inactivo'}</td>
        <td>
          <div class="row-actions">
            <button class="btn-icon stock-btn" title="Editar stock" onclick="openStockModal(${a.id},'${a.nombre.replace(/'/g,"\\'")}',${a.stock})"><i class="fas fa-warehouse"></i></button>
            <button class="btn-icon" title="Editar" onclick="openEditAcc(${a.id})"><i class="fas fa-pen"></i></button>
            <button class="btn-icon del" title="Eliminar" onclick="deleteAcc(${a.id},'${a.nombre.replace(/'/g,"\\'")}')"><i class="fas fa-trash"></i></button>
          </div>
        </td>
      </tr>`;
  }).join('');
}

$('search-acc').addEventListener('input', renderAccesorios);
$('filter-cat').addEventListener('change', renderAccesorios);

/* ── Modal accesorio ── */
function openNewAcc() {
  $('modal-acc-title').textContent = 'Nuevo accesorio';
  $('acc-id').value = '';
  ['acc-nombre','acc-precio','acc-stock','acc-imagen'].forEach(id => $(id).value = '');
  $('acc-cat').value = 'general';
  $('acc-activo').value = '1';
  $('modal-acc').classList.add('open');
}

function openEditAcc(id) {
  const a = allAccesorios.find(x => x.id === id);
  if (!a) return;
  $('modal-acc-title').textContent = 'Editar accesorio';
  $('acc-id').value    = a.id;
  $('acc-nombre').value = a.nombre;
  $('acc-precio').value = a.precio;
  $('acc-stock').value  = a.stock;
  $('acc-imagen').value = a.imagen || '';
  $('acc-cat').value    = a.categoria;
  $('acc-activo').value = String(a.activo);
  $('modal-acc').classList.add('open');
}

$('btn-nuevo-acc').addEventListener('click', openNewAcc);
$('modal-acc-cancel').addEventListener('click', () => $('modal-acc').classList.remove('open'));

$('modal-acc-save').addEventListener('click', async () => {
  const id     = $('acc-id').value;
  const payload = {
    nombre:    $('acc-nombre').value.trim(),
    precio:    parseInt($('acc-precio').value) || 0,
    stock:     parseInt($('acc-stock').value)  || 0,
    imagen:    $('acc-imagen').value.trim(),
    categoria: $('acc-cat').value,
    activo:    parseInt($('acc-activo').value),
  };
  if (!payload.nombre) { toast('El nombre es requerido', 'error'); return; }

  const method = id ? 'PUT' : 'POST';
  const url    = id ? `/admin/accesorios/${id}` : '/admin/accesorios';
  const res    = await api(url, { method, body: JSON.stringify(payload) });
  if (!res || !res.ok) { toast('Error al guardar', 'error'); return; }

  toast(id ? 'Accesorio actualizado ✓' : 'Accesorio creado ✓');
  $('modal-acc').classList.remove('open');
  loadAccesorios();
  loadStats();
});

async function deleteAcc(id, nombre) {
  if (!confirm(`¿Eliminar "${nombre}"?`)) return;
  const res = await api(`/admin/accesorios/${id}`, { method: 'DELETE' });
  if (res?.ok) { toast('Eliminado'); loadAccesorios(); loadStats(); }
  else toast('Error al eliminar', 'error');
}

/* ── Modal stock rápido ── */
function openStockModal(id, nombre, stock) {
  editStockId = id;
  $('modal-stock-title').textContent = `Stock — ${nombre}`;
  $('stock-val').value = stock;
  $('modal-stock').classList.add('open');
}

$('stock-dec').addEventListener('click', () => { const v = parseInt($('stock-val').value)||0; if(v>0) $('stock-val').value = v-1; });
$('stock-inc').addEventListener('click', () => { $('stock-val').value = (parseInt($('stock-val').value)||0) + 1; });

$('modal-stock-cancel').addEventListener('click', () => $('modal-stock').classList.remove('open'));

$('modal-stock-save').addEventListener('click', async () => {
  const stock = parseInt($('stock-val').value);
  if (isNaN(stock) || stock < 0) { toast('Stock inválido', 'error'); return; }
  const res = await api(`/admin/accesorios/${editStockId}/stock`, {
    method: 'PATCH',
    body: JSON.stringify({ stock })
  });
  if (res?.ok) {
    toast('Stock actualizado ✓');
    $('modal-stock').classList.remove('open');
    loadAccesorios();
    loadStats();
  } else toast('Error', 'error');
});

/* ══════════════════════════════════════════
   TURNOS
══════════════════════════════════════════ */
async function loadTurnos() {
  const res = await api('/admin/turnos');
  if (!res) return;
  allTurnos = await res.json();
  renderTurnos();
}

function renderTurnos() {
  const q   = $('search-turno').value.toLowerCase();
  const mat = $('filter-material').value;
  const pag = $('filter-pago').value;

  const filtered = allTurnos.filter(t =>
    (!q   || t.nombre.toLowerCase().includes(q) || (t.auto||'').toLowerCase().includes(q)) &&
    (!mat || t.material === mat) &&
    (!pag || t.pago === pag)
  );

  if (!filtered.length) {
    $('turnos-tbody').innerHTML = '<tr><td colspan="8"><div class="empty"><i class="fas fa-calendar-times"></i><p>Sin turnos registrados</p></div></td></tr>';
    return;
  }

  $('turnos-tbody').innerHTML = filtered.map(t => {
    const dt    = new Date(t.start_time);
    const fecha = isNaN(dt) ? t.start_time : dt.toLocaleDateString('es-AR', { day:'2-digit', month:'2-digit', year:'numeric' });
    const hora  = isNaN(dt) ? '' : dt.toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' });

    const matColor = {
      'Cuerina Premium':   '#a78bfa',
      'Cuero Sintético':   '#60a5fa',
      'Cuero Natural':     '#34d399',
      'Lo decido en el momento': 'var(--muted)'
    }[t.material] || 'var(--accent)';

    return `
      <tr>
        <td style="font-weight:600">${fecha}</td>
        <td style="color:var(--muted)">${hora}</td>
        <td>${t.nombre || '—'}</td>
        <td style="color:var(--muted);font-size:.85rem">${t.telefono || '—'}</td>
        <td>${(t.auto||'—')} </td>
        <td style="color:var(--muted);font-size:.85rem">${t.anio||'—'}</td>
        <td><span style="color:${matColor};font-size:.85rem;font-weight:600">${t.material||'—'}</span></td>
        <td><span class="badge-cat" style="border-color:rgba(143,201,176,.15)">${t.pago||'—'}</span></td>
      </tr>`;
  }).join('');
}

$('search-turno').addEventListener('input', renderTurnos);
$('filter-material').addEventListener('change', renderTurnos);
$('filter-pago').addEventListener('change', renderTurnos);

/* cerrar modals clicking overlay */
['modal-acc','modal-stock'].forEach(id => {
  $(id).addEventListener('click', e => { if(e.target === $(id)) $(id).classList.remove('open'); });
});
</script>
</body>
</html>
